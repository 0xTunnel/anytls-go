services:
  anytls-ppanel:
    image: ${ANYTLS_IMAGE:-ghcr.io/0xTunnel/anytls-ppanel:latest}
    container_name: anytls-ppanel
    network_mode: host
    restart: always
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    volumes:
      - .:/etc/anytls
