name: release-binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to release, for example v1.0.0
        required: true
        type: string

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate manual tag input
        if: github.event_name == 'workflow_dispatch'
        run: |
          tag="${{ github.event.inputs.tag }}"
          if ! [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "tag must follow semantic versioning: vX.Y.Z"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warn if release already exists
        if: github.event_name == 'workflow_dispatch'
        run: |
          if gh release view "${{ github.event.inputs.tag }}" >/dev/null 2>&1; then
            echo "warning: GitHub Release for ${{ github.event.inputs.tag }} already exists"
            echo "warning: goreleaser may update existing release assets"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Go tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}